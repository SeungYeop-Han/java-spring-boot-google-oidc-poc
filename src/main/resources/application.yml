server:
  port: 8443
  ssl:
    key-store: ${SSL_KEY_STORE}
    key-store-password: ${SSL_PASSWORD}
    key-store-type: ${SSL_KEY_STORE_TYPE}
    key-alias: ${SSL_KEY_ALIAS}
    key-password: ${SSL_PASSWORD}

spring:
  application:
    name: google-oidc-poc
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    database-platform: org.hibernate.dialect.MySQLDialect
  security:
    oauth2:
      client:
        # the base property prefix for OAuth Client properties.
        registration:
          # Following the base property prefix is the ID for the ClientRegistration, such as Google.
          google:
            redirect-uri: https://localhost:8443/login/oauth2/code/google
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
        # google OpenID discovery document
        provider:
          google-oidc:
            issuer-uri: https://accounts.google.com
auth:
  google-oidc:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
