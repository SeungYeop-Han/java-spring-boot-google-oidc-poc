server:
  port: 8443
  ssl:
    key-store: ${SSL_KEY_STORE}
    key-store-password: ${SSL_PASSWORD}
    key-store-type: ${SSL_KEY_STORE_TYPE}
    key-alias: ${SSL_KEY_ALIAS}
    key-password: ${SSL_PASSWORD}

spring:
  application:
    name: google-oidc-poc
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    database-platform: org.hibernate.dialect.MySQLDialect
  security:
    oauth2:
      client:
        registration:
          google:
            # 최초 진입 경로 기본 값: /oauth2/authorization/google
            # redirect-uri(필터 주소) 기본 값: {baseUrl}/{action}/oauth2/code/{registrationId}
            # redirect-uri(provider 에 전송) 기본 값: /login/oauth2/code/*
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - openid
              - email
              - profile

app:
  auth:
    jwt:
      secret: ${APP_JWT_SECRET:"우리가_발급할_JWT_액세스_토큰의_시크릿_키입니다._최소_32_바이트_길이로_작성되어야_합니다."}